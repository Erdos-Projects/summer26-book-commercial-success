# Project-specific environment for book-commercial-success
#
# Create:  conda env create -f environment.yml
# Update:  conda env update -f environment.yml --prune
# Use:     conda activate book-success-env && jupyter lab

name: book-success-env
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pandas=3.0.3
  - numpy=2.4.6
  - scikit-learn=1.8.0
  - scipy=1.17.1
  - matplotlib=3.10.8
  - seaborn=0.13.2
  - joblib=1.5.3
  - pyarrow=24.0.0
  - requests=2.34.2
  - tqdm=4.67.3
  - jupyterlab=4.5.7
  - notebook=7.5.6
  - nbconvert=7.17.1
  - nbformat=5.10.4
  - ipykernel=7.2.0
  - pytorch=2.12.1
  - sentence-transformers=5.6.0
  - vadersentiment=3.3.2
  - thefuzz=0.22.1
  - python-levenshtein=0.27.3
